<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
// Send "show" to the active tab then close this popup immediately.
chrome.tabs.query({ active: true, currentWindow: true }, ([tab]) => {
  if (tab?.id) {
    chrome.tabs.sendMessage(tab.id, { action: 'show' }, () => {
      // Ignore "no receiver" errors (e.g. on chrome:// pages)
      void chrome.runtime.lastError;
    });
  }
  window.close();
});
</script>
</body>
</html>
